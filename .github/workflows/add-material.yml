name: Process Material Upload

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process-upload:
    if: contains(github.event.issue.labels.*.name, 'upload-material')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue body and process upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python .github/scripts/process_upload.py

      - name: Install indexing dependencies
        run: |
          pip install llama-index-core llama-index-embeddings-huggingface sentence-transformers PyPDF2

      - name: Rebuild vector index
        run: |
          python .github/scripts/build_index.py

      - name: Commit updated manifest and index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json index/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Add material from issue #${{ github.event.issue.number }} and rebuild index"
          git push
