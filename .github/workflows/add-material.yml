name: Process Material Upload

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: materials-main-writes
  cancel-in-progress: false

jobs:
  process-upload:
    if: |
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'upload-material')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue body and process upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python .github/scripts/process_upload.py

      - name: Install indexing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          pip install llama-index-core llama-index-embeddings-huggingface sentence-transformers PyPDF2 pytesseract pypdfium2 Pillow python-pptx python-docx fpdf2

      - name: Rebuild vector index
        run: |
          python .github/scripts/build_index.py

      - name: Commit updated manifest and index
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add manifest.json index/
          if [ -f indexed_files.json ]; then git add indexed_files.json; fi
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Add material from issue #${{ github.event.issue.number }} and update index"

          # Bring local branch up to date, then push. Retry once to handle concurrent runs.
          for i in 1 2; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push; then
              exit 0
            fi
            echo "Push failed (attempt $i). Retrying..."
            sleep $((i * 2))
          done

          echo "Push failed after retries."
          exit 1
